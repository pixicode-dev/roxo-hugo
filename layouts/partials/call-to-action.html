{{ with .Params.cta_block }}
<section class="cta-phone-section"
  style="background-color: {{ .cta_background | default "transparent" }};">
  <div class="container cta-container">

    {{ if .hand_frame }}
    <img src="{{ .hand_frame | relURL }}"
      srcset="/images/hand-mobile.webp 300w, {{ .hand_frame | relURL }} 500w"
      sizes="(max-width: 768px) 300px, 500px"
      class="hand-frame"
      alt="Main tenant un smartphone présentant une application PixiCode"
      width="500"
      height="657"
      loading="lazy"> {{ end }}

    <div class="cta-box {{ if eq .cta_background "transparent" }}shadow-none{{
      end }}">

      <div class="row align-items-center">

        <div class="col-lg-6 order-2 order-lg-1">
          <div class="cta-content p-4 p-lg-5">
            <p class="overline-dash text-uppercase fw-bold small mb-2">VOUS
              AVEZ UN BESOIN
              ?</p>
            <h4 class="display-5 fw-bold mb-4 cta-text">{{ .title }}</h4>
            <a href="{{ .button_link | relURL }}"
              class="btn-cta px-4 py-3"
              style="border-radius: 4px;">
              {{ .button_text }}
            </a>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
{{ end }}
