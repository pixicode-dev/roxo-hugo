{{ define "main" }}
<div class="bg-header">
  <img src="/images/Background2.svg" alt="Header"
    class="page-header2-bg img-fluid" fetchpriority="high">
</div>

<section class="legal-header">
  <div
    class="container h-100 d-flex flex-column justify-content-center align-items-center">
    <h1 class="text-uppercase fw-bold mb-0">{{ .Title }}</h1>

    <div class="header-decoration mt-3"></div>

    <p class="breadcrumb-text mt-3 mb-0">ACCUEIL / {{ .Title | upper }}</p>
  </div>

  <div class="header-bg-overlay"></div>
</section>

<section class="legal-section bg-light-gradient">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-10 col-xl-9">

        <div class="legal-paper">
          <article class="legal-content">
            {{ .Content }}
          </article>
        </div>

      </div>
    </div>
  </div>
</section>

{{ end }}
